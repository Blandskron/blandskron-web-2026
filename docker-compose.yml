services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: blandskron/portafolioweb:latest
    # Carga automática de todas tus variables (Email, Secret Key, etc.)
    env_file:
      - .env
    
    ports:
      - "8000:8000"
    
    environment:
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_SECURE_SSL_REDIRECT=${DJANGO_SECURE_SSL_REDIRECT:-False}
      - DJANGO_DB_PATH=/data/db.sqlite3
    
    volumes:
      # Persistencia solo de la base de datos; no cubrir el código de la app.
      - sqlite_data:/data
      # Persistencia de archivos estáticos para WhiteNoise
      - static_volume:/app/blandskron/staticfiles
    
    # Ruta absoluta al script que definimos en el Dockerfile
    command: /app/docker-entrypoint.sh
    restart: always

volumes:
  sqlite_data:
  static_volume:
